name = "jeevajyothi-api-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
# Set BACKEND_URL with: wrangler secret put BACKEND_URL --env production
# Example (not required here): BACKEND_URL = "https://your-backend.onrender.com"

[env.production]
route = "api.jeevajyothimedia.com/*"

[env.production.vars]
# Optional: can be omitted if you use wrangler secret put
# BACKEND_URL = "https://your-backend.onrender.com"

