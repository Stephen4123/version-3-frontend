  <meta name="yandex" content="notranslate">

  <meta name="description" content="About Jeevajyothi Media &mdash; Christian messages, worship, and community since 2003.">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">
  <meta property="og:type" content="">
  
  <link rel="stylesheet" href="assets/css/styles.css?v=202605071811">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Michroma&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2866754402147741" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">
        <img src="https://drive.google.com/thumbnail?id=1jaEnOnm2O0w6882JCtHgYNJQ0HcXwzB7&sz=w500" alt="Jeevajyothi Media Logo" class="brand-logo">
        <span id="headerBrandName">Jeevajyothi Media</span>
      </a>
      <nav class="nav">
        <!-- Navigation will be loaded dynamically -->
      </nav>
    </div>
  </header>
  <div class="announcement-bar"><div class="announcement-track"></div></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <h1>About</h1>
        <p class="lede">Jeevajyothi Media</p>
      </div>
    </section>

    <section class="about-content">
      <div class="container">
        <h2>About <span id="aboutBrandName">Jeevajyothi Media</span></h2>
        <div id="aboutContent"></div>
      </div>
    </section>
  </main>

  <!-- Mobile Ads -->
  <div class="mobile-ads">
    <div class="container">
      <div class="grid two">
        <a href="tel:+918078864233" class="ad-banner horizontal">
          <img src="https://drive.google.com/uc?id=1GN7-XzemWx5vMZ-TZm894FcUBhxqp6oq" alt="Call Us">
        </a>
        <a href="https://wa.me/+918078864233" class="ad-banner horizontal">
          <img src="https://drive.google.com/uc?id=1jBKSTnXQH9vuO0pNOKsGwFKaVu0AQ2E6" alt="WhatsApp">
        </a>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> <span id="footerBrandName">Jeevajyothi Media</span> • <span id="footerText">Believe • Sing • Share</span></p>
      <div class="social">
        <a id="footerFacebook" href="https://www.facebook.com/jeevajyothigospelvoice" target="_blank" rel="noopener">
          <img src="assets/images/facebook.png?v=202605071811" alt="Facebook">
        </a>
        <a id="footerInstagram" href="https://www.instagram.com/jeevajyothi_media" target="_blank" rel="noopener">
          <img src="assets/images/instagram.png?v=202605071811" alt="Instagram">
        </a>
        <a id="footerYouTube" href="https://www.youtube.com/@jeevajyothimedia" target="_blank" rel="noopener">
          <img src="assets/images/youtube.png?v=202605071811" alt="YouTube">
        </a>
      </div>
    </div>
  </footer>
  <!-- Left Sidebar Ad -->
  <div class="sidebar-ad left-ad">
    <div class="ad-banner vertical">
      <img src="assets/images/ad-contact.jpg?v=202605071811" alt="Call Us">
    </div>
  </div>

  <!-- Right Sidebar Ad -->
  <div class="sidebar-ad right-ad">
    <div class="ad-banner vertical">
      <img src="assets/images/ad-contact-2.jpg?v=202605071811" alt="WhatsApp">
    </div>
  </div>

  <script src="assets/js/loader.js"></script>
  <script src="assets/js/content-protection.js" defer></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/load-navigators.js"></script>
  <script src="assets/js/load-about.js"></script>
  <script src="assets/js/load-whatsapp.js" defer></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Show loader on every link click
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('click', function(e) {
        const target = e.target.closest('a');
        if (target && target.href && !target.href.startsWith('javascript:') && target.target !== '_blank') {
          window.LoaderUtils.showGlobalLoader('Loading...');
        }
      });
    });

    // Hide loader on page load
    window.addEventListener('load', function() {
      window.LoaderUtils.hideGlobalLoader();
    });
  </script>
</body>
</html>
