  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Show loader on every link click
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('click', function(e) {
        const target = e.target.closest('a');
        if (target && target.href && !target.href.startsWith('javascript:') && target.target !== '_blank') {
          window.LoaderUtils.showGlobalLoader('Loading...');
        }
      });
    });

    // Hide loader on page load
    window.addEventListener('load', function() {
      window.LoaderUtils.hideGlobalLoader();
    });

    // Update brand name and social links
    (function() {
      const LS_KEY = 'site.data.v1';
      function readSiteData() {
        try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; } catch (_) { return null; }
      }
      const site = readSiteData();
      if (site && site.other) {
        const headerBrandName = document.getElementById('headerBrandName');
        const footerBrandName = document.getElementById('footerBrandName');
        const footerText = document.getElementById('footerText');
        if (headerBrandName && site.other.brandName) headerBrandName.textContent = site.other.brandName;
        if (footerBrandName && site.other.brandName) footerBrandName.textContent = site.other.brandName;
        if (footerText && site.other.footerText) footerText.textContent = site.other.footerText;
        const footerFacebook = document.getElementById('footerFacebook');
        const footerInstagram = document.getElementById('footerInstagram');
        const footerYouTube = document.getElementById('footerYouTube');
        if (footerFacebook && site.other.facebookLink) footerFacebook.href = site.other.facebookLink;
        if (footerInstagram && site.other.instagramLink) footerInstagram.href = site.other.instagramLink;
        if (footerYouTube && site.other.youtubeLink) footerYouTube.href = site.other.youtubeLink;
      }
    })();

    // Navigate to article page
    function viewArticle(post) {
      sessionStorage.setItem('updatesScrollPosition', window.scrollY);
      const url = getArticleurl(post);
      window.location.href = url;
    }

    // Get article URL based on post type
    function getArticleurl(post) {
      return 'news-article.html?slug=' + encodeURIComponent(post.slug);
    }

    // Render news posts with same card design as home page
    setTimeout(async () => {
      const grid = document.getElementById('postGrid');
      const empty = document.getElementById('emptyState');

      if (!grid) return;

      try {
        // First try to load from backend
        let posts = [];

        if (window.loadPosts) {
          posts = await window.loadPosts(false);
        }

        // If no posts from backend, try local posts.json
        if (!posts || posts.length === 0) {
          console.log('No posts from backend, loading from local posts.json...');
          const response = await fetch(`${API_BASE}/posts`);
          if (!response.ok) {
            throw new Error('Failed to fetch posts.json: ' + response.status);
          }
          const localPosts = await response.json();

        // Transform local posts to match expected format
        posts = localPosts.map(p => ({
          title: p.title,
          slug: p.slug,
          date: p.date,
          displayDate: p.displayDate || p.date,
          tags: p.tags || [],
          excerpt: p.excerptHtml || p.excerpt || '',
          excerptHtml: p.excerptHtml || p.excerpt || '',
          cover: p.cover || (p.coverImages && p.coverImages[0]) || '',
          featured: !!p.featured,
          contentHtml: p.contentHtml || '',
          coverImages: p.coverImages || [],
          type: p.type || 'news',
          language: p.language || 'English',
          author: p.author || ''
        }));
        }

        // Filter out obituaries
        posts = posts.filter(p => {
          const type = String(p.type || p.contentType || '').toLowerCase();
          return type !== 'obituary';
        });
        posts.reverse();

        // Set total posts count
        document.getElementById('totalPosts').textContent = posts.length;

        // Function to parse displayDate
        function parseDisplayDate(displayDate) {
          if (!displayDate) return new Date(0);
          // Handle Malayalam dates
          const malayalamMonths = {
            'ജനുവരി': 'January',
            'ഫെബ്രുവരി': 'February',
            'മാര്ച്ച്': 'March',
            'ഏപ്രില്': 'April',
            'മേയ്': 'May',
            'ജൂണ്': 'June',
            'ജൂലൈ': 'July',
            'ഓഗസ്റ്റ്': 'August',
            'സെപ്തംബര്': 'September',
            'ഒക്ടോബര്': 'October',
            'നവംബര്': 'November',
            'ഡിസംബര്': 'December'
          };
          let dateStr = displayDate;
          for (const [mal, eng] of Object.entries(malayalamMonths)) {
            dateStr = dateStr.replace(mal, eng);
          }
          // Now parse as English
          // Assume format like "Nov 11,2025" or "11 November 2025"
          const parts = dateStr.replace(',', '').split(' ');
          if (parts.length === 3) {
            const [month, day, year] = parts;
            return new Date(`${month} ${day}, ${year}`);
          } else if (parts.length === 2) {
            // e.g., "Nov 11,2025" wait, it's "Nov 11,2025" which is month day,year
            const [month, dayYear] = parts;
            const [day, year] = dayYear.split(',');
            return new Date(`${month} ${day}, ${year}`);
          }
          return new Date(dateStr); // fallback
        }


        grid.innerHTML = '';

        if (posts.length === 0) {
          empty.hidden = false;
          return;
        }

        // Initialize filter state from session storage when returning
        let selectedType = sessionStorage.getItem('updatesSelectedType') || '';
        let selectedLanguage = sessionStorage.getItem('updatesSelectedLanguage') || '';
        const pageSize = Number.MAX_SAFE_INTEGER;
        let page = 1;

        function updateFilterButtons() {
          document.querySelectorAll('.filter-btn[data-type]').forEach(b => {
            const type = b.dataset.type || '';
            b.classList.toggle('active', type === selectedType);
          });
          document.querySelectorAll('.filter-btn[data-language]').forEach(b => {
            const language = b.dataset.language || '';
            b.classList.toggle('active', language === selectedLanguage);
          });
        }

        // Function to apply filters
        function applyFilters() {
          if (!window.createPostCard) {
            setTimeout(applyFilters, 100);
            return;
          }
          let filteredPosts = posts;
          if (selectedType) {
            filteredPosts = filteredPosts.filter(p => p.type === selectedType);
          }
          if (selectedLanguage) {
            filteredPosts = filteredPosts.filter(p => p.language === selectedLanguage);
          }
          grid.innerHTML = '';
          const take = filteredPosts.slice(0, page * pageSize);
          take.forEach(p => {
            try {
              const article = window.createPostCard(p);
              grid.appendChild(article);
            } catch (err) {
              console.error('Error creating post card:', err);
            }
          });
          if (empty) empty.hidden = filteredPosts.length > 0;
        }

        // Add event listeners for filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            const type = this.dataset.type;
            const language = this.dataset.language;

            if (type !== undefined) {
              selectedType = type;
              sessionStorage.setItem('updatesSelectedType', selectedType);
              document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
              this.classList.add('active');
            } else if (language !== undefined) {
              selectedLanguage = language;
              sessionStorage.setItem('updatesSelectedLanguage', selectedLanguage);
              document.querySelectorAll('.filter-btn[data-language]').forEach(b => b.classList.remove('active'));
              this.classList.add('active');
            }

            page = 1;
            applyFilters();
          });
        });

        updateFilterButtons();
        // Initial render
        applyFilters();
        
        // Restore scroll position if returning from article
        const restoreUpdatesScroll = () => {
          const savedPosition = sessionStorage.getItem('updatesScrollPosition');
          if (savedPosition) {
            window.scrollTo({ top: parseInt(savedPosition, 10) || 0, behavior: 'auto' });
            sessionStorage.removeItem('updatesScrollPosition');
          }
        };

        setTimeout(restoreUpdatesScroll, 100);
        window.addEventListener('pageshow', function (event) {
          if (event.persisted) {
            restoreUpdatesScroll();
          }
        });
      } catch (error) {
        console.error('Failed to load posts:', error);
        grid.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">Error loading news. Please try again later.</p>';
        if (empty) empty.hidden = true;
      }
    }, 0);

    // Load WhatsApp community link
    fetch(`${API_BASE}/whatsapp`)
      .then(response => response.json())
      .then(data => {
        const link = document.getElementById('whatsappCommunityLink');
        if (!link) return;
        if (data.communityLink) {
          link.href = data.communityLink;
        }
        const img = link.querySelector('img');
        if (img && data.image) {
          img.src = data.image;
        }
      })
      .catch(error => console.error('Failed to load WhatsApp link:', error));
  </script>
