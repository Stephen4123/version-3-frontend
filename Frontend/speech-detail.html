  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function normalizeText(value) {
      return String(value || '')
        .replace(/[^\w\s.-]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    const CACHE_BUST = '20260430';
    function appendCacheBust(url) {
      if (!url || typeof url !== 'string' || url.includes('?')) return url;
      if (/^(?:\.\/|\/)?assets\//.test(url)) return url + '?v=' + CACHE_BUST;
      return url;
    }

    function slugify(value) {
      return normalizeText(value)
        .replace(/[_.]/g, '-')
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    function isBoardMemberName(authorName, team) {
      if (!authorName || !Array.isArray(team)) return false;
      const normalizedAuthor = normalizeText(authorName);
      return team.some(member => {
        const normalizedMemberName = normalizeText(member.name || '');
        return normalizedMemberName === normalizedAuthor ||
               normalizedMemberName.includes(normalizedAuthor) ||
               normalizedAuthor.includes(normalizedMemberName);
      });
    }

    // Load speech based on URL parameter
    const API_BASE = 'http://localhost:3000/api/public';
    window.LoaderUtils?.requestLoaderHold();
    setTimeout(async () => {
      const params = new URLSearchParams(window.location.search);
      const id = parseInt(params.get('id'));

      if (!id || isNaN(id)) {
        document.getElementById('speechContent').innerHTML = '<p>Speech not found.</p>';
        return;
      }

      try {
        const [speechResponse, teamResponse] = await Promise.all([
          fetch(`${API_BASE}/speech/${id}`),
          fetch(`${API_BASE}/board-members`).catch(() => null)

        ]);

        if (!speechResponse.ok) throw new Error('Failed to fetch speeches');

        const speechData = await speechResponse.json();
        const teamData = teamResponse && teamResponse.ok
          ? await teamResponse.json()
          : [];

        const speech = speechData && (Array.isArray(speechData.speeches) ? speechData.speeches[0] : speechData);
        const speechResolved = (speech && typeof speech === 'object' && 'id' in speech) ? speech : (Array.isArray(speechData.speeches) ? speechData.speeches.find(s => s.id === id) : null);


        if (!speechResolved) {
          document.getElementById('speechContent').innerHTML = '<p>Speech not found.</p>';
          return;
        }


        const teamMembers = Array.isArray(teamData) ? teamData : [];
        const authorName = speech.authorName || 'Unknown Speaker';
const authorIsBoardMember = isBoardMemberName(authorName, teamMembers);
        const authorPanelStart = authorIsBoardMember
          ? `<a class="speech-author-panel speech-author-panel-link" href="board-member.html?member=${slugify(authorName)}&v=202604301751" style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:1rem 1.1rem;border:1px solid var(--border-color);border-radius:14px;background:rgba(255,255,255,0.03);text-decoration:none;color:inherit;">`
          : `<div class="speech-author-panel">`;
        const authorPanelEnd = authorIsBoardMember ? '</a>' : '</div>';
        const authorMarkup = `<span class="speech-author-name">${authorName}</span>`;

        // Set page title
        document.title = `${speech.title} - Jeevajyothi Media`;

        // Open Graph meta tags
        const ogTitle = document.createElement('meta');
        ogTitle.setAttribute('property', 'og:title');
        ogTitle.setAttribute('content', speech.title);
        document.head.appendChild(ogTitle);

        const ogDescription = document.createElement('meta');
        ogDescription.setAttribute('property', 'og:description');
        ogDescription.setAttribute('content', speech.content.substring(0, 150) + '...');
        document.head.appendChild(ogDescription);

        const ogImage = document.createElement('meta');
        ogImage.setAttribute('property', 'og:image');
        ogImage.setAttribute('content', 'assets/images/og-cover.jpg');
        document.head.appendChild(ogImage);

        const ogUrl = document.createElement('meta');
        ogUrl.setAttribute('property', 'og:url');
        ogUrl.setAttribute('content', window.location.href);
        document.head.appendChild(ogUrl);

        // Populate content
        document.getElementById('speechTitle').textContent = speech.title;
        const dateStr = speech.date ? new Date(speech.date).toLocaleDateString('en-GB', {
          day: 'numeric',
          month: 'short',
          year: 'numeric'
        }) : '';
        document.getElementById('speechMeta').innerHTML = `${dateStr || ''}`;

        const authorImage = appendCacheBust(speech.authorImage || speech.image || '');
        const speechLabel = speech.cardLabel || 'പ്രസംഗക്കുറിപ്പ്';
        let speechBodyHtml = speech.content || '';
        let mainVerseHtml = '';

        if (speech.mainVerseHtml) {
          mainVerseHtml = speech.mainVerseHtml;
        } else if (speech.mainVerseTitle || speech.mainVerseText) {
          mainVerseHtml = `
            <strong>${speech.mainVerseTitle || 'Main Verse'}</strong>
            <p>${speech.mainVerseText || ''}</p>
          `;
        } else {
          const parsed = document.createElement('div');
          parsed.innerHTML = speechBodyHtml;
          const verseBlock = parsed.querySelector('.bible-verse');
          if (verseBlock) {
            mainVerseHtml = verseBlock.innerHTML;
            verseBlock.remove();
            speechBodyHtml = parsed.innerHTML;
          }
        }

        document.getElementById('speechContent').innerHTML = `
          <p class="speech-detail-kicker">${speechLabel}</p>
          ${authorPanelStart}
            ${authorImage ? `<img src="${authorImage}" alt="${speech.authorName || 'Author'}">` : ''}
            <div>
              <span class="speech-author-label">Author</span>
              ${authorMarkup}
            </div>
          ${authorPanelEnd}
          ${mainVerseHtml ? `
            <div class="speech-main-verse-panel">
              <span class="speech-main-verse-label">Main Verse</span>
              ${mainVerseHtml}
            </div>
          ` : ''}
          <div class="speech-body-text">
            ${speechBodyHtml}
          </div>
        `;

        // Share button
        const shareBtn = document.getElementById('shareSpeechBtn');
        shareBtn.addEventListener('click', function(e) {
          e.preventDefault();
          const url = window.location.href.replace(/\.html(?=[?#]|$)/gi, '');
          const brandName = document.getElementById('headerBrandName')?.textContent || 'Jeevajyothi Media';
          const fullText = `*🛡️${speech.title}*\n*📌${brandName} - പ്രസംഗക്കുറിപ്പ്*\n*📝${speech.authorName}*\n🔗 ${url}`;
          shareText(fullText, speech.title);
        });

      } catch (error) {
        console.error('Failed to load speech:', error);
        document.getElementById('speechContent').innerHTML = '<p>Error loading speech. Please try again later.</p>';
      } finally {
        window.LoaderUtils?.releaseLoaderHold();
      }
    }, 500);

    function shareText(text, title) {
      if (navigator.share) {
        navigator.share({ title, text }).catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied to clipboard!');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Copied to clipboard!');
      });
    }
  </script>
