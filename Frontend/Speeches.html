  <script>
    (function() {
      // 1. Clipboard Fallback
      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          alert('Link copied to clipboard!');
        } catch (err) {}
        document.body.removeChild(ta);
      }

      // 2. Universal Share Logic
      function universalShare(text, title) {
        if (navigator.share) {
          navigator.share({ title: title, text: text }).catch((err) => {
            if (err.name !== 'AbortError') fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }

      // 3. Generate Clean Detail URL
      function getSpeechDetailurl(speechId) {
        const baseUrl = window.location.origin;
        const path = window.location.pathname;
        const directory = path.substring(0, path.lastIndexOf('/') + 1);
        return `${baseUrl}${directory}speech-detail?id=${speechId}`;
      }

      // 4. Create Card UI
      function createSpeechCard(speech) {
        const article = document.createElement('article');
        article.className = 'speech-card';
        article.style.cursor = 'pointer';

        const authorImage = speech.authorImage || speech.image || '';
        const dateStr = speech.date ? new Date(speech.date).toLocaleDateString('en-GB', { 
          day: 'numeric', month: 'short', year: 'numeric' 
        }) : '';
        
        const coverMarkup = authorImage
          ? `<img src="${authorImage}" alt="${speech.authorName}" class="speech-author-thumb" loading="lazy">`
          : '<span class="speech-cover-icon">📖 Speech</span>';

        article.innerHTML = `
          <div class="speech-cover" style="background:linear-gradient(135deg, #2c3e66, #1e2a4a);color:white;display:flex;align-items:center;justify-content:center;">
            ${coverMarkup}
          </div>
          <p class="speech-card-kicker">${speech.cardLabel || 'പ്രസംഗക്കുറിപ്പ്'}</p>
          <h3 class="speech-card-title">${speech.title}</h3>
          <p class="meta">${dateStr || ''}</p>
          <div class="speech-card-footer">
            <span class="speech-card-author"><strong>${speech.authorName || 'Unknown Speaker'}</strong></span>
            <button class="btn share-speech-btn speech-card-share" type="button">Share</button>
          </div>
        `;

        // Card Click Navigation
        article.addEventListener('click', (e) => {
          if (!e.target.classList.contains('share-speech-btn')) {
            sessionStorage.setItem('speechesScrollPosition', window.scrollY);
            window.location.href = `speech-detail.html?id=${speech.id}`;
          }
        });

        // Share Button Click Logic
        const shareBtn = article.querySelector('.share-speech-btn');
        shareBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          e.preventDefault();
          
          const detailUrl = getSpeechDetailurl(speech.id);
          const brandName = document.getElementById('headerBrandName')?.textContent.trim() || 'Jeevajyothi Media';
          
          // Formatted Message with Emojis
          const fullText = `*🛡️${speech.title}*\n*📌${brandName} - പ്രസംഗക്കുറിപ്പ്*\n*📝${speech.authorName}*\n🔗 ${detailUrl}`;
          
          universalShare(fullText, speech.title);
        });

        return article;
      }

      // 5. Load Speeches from JSON
      async function loadSpeeches() {
        const grid = document.getElementById('speechesGrid');
        const countElem = document.getElementById('speechCount');
        if (!grid) return;

        try {
          const API_BASE = 'https://api.jeevajyothimedia.com/api/public';
          const response = await fetch(`${API_BASE}/speeches?t=${Date.now()}`);
          const data = await response.json();
          const speeches = Array.isArray(data) ? data : (Array.isArray(data.data) ? data.data : (data.speeches || []));

          
          if (countElem) {
            countElem.textContent = `${speeches.length} speech${speeches.length === 1 ? '' : 'es'} available`;
          }

          if (speeches.length > 0) {
            grid.innerHTML = '';
            speeches.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            speeches.forEach(s => grid.appendChild(createSpeechCard(s)));
          }

          const savedPosition = sessionStorage.getItem('speechesScrollPosition');
          if (savedPosition) {
            window.scrollTo(0, parseInt(savedPosition, 10));
            sessionStorage.removeItem('speechesScrollPosition');
          }
        } catch (error) {

          console.error('Fetch error:', error);
          if (countElem) {
            countElem.textContent = 'Unable to load speech count';
          }
        }
      }

      // Initialize
      document.addEventListener('DOMContentLoaded', () => {

        const yearSpan = document.getElementById('year');
        if (yearSpan) yearSpan.textContent = new Date().getFullYear();
        loadSpeeches();
      });
    })();
  </script>
