<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google" content="notranslate">
  <meta name="yandex" content="notranslate">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1Lavb4TCE2QFKQ7ig1XlrX30KoLCjJYPp&sz=w1000">
  <title>Videos — Jeevajyothi Media</title>
  <meta name="description" content="Watch Christian worship videos, sermons, and messages from Jeevajyothi Media.">
  <meta property="og:title" content="">
  <meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">
  <meta property="og:type" content="">
  <link rel="stylesheet" href="assets/css/styles.css?v=202605071811">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Michroma&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2866754402147741" crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/">
        <img src="https://drive.google.com/thumbnail?id=1jaEnOnm2O0w6882JCtHgYNJQ0HcXwzB7&sz=w500" alt="Jeevajyothi Media Logo" class="brand-logo">
        <span id="headerBrandName">Jeevajyothi Media</span>
      </a>
      <nav class="nav">
        <!-- Navigation will be loaded dynamically -->
      </nav>
    </div>
  </header>
  <div class="announcement-bar"><div class="announcement-track"></div></div>
  <main>


    <section class="featured-posts videos-page">
      <div class="container">
        <div class="page-hero">
          <h1>Watch &amp; Be Blessed</h1>
          <p class="lede" style="margin:0.4rem auto 1rem;">Sermons, worship &amp; messages to uplift your spirit</p>
          <a class="yt-channel-btn" href="https://www.youtube.com/@jeevajyothimedia" target="_blank" rel="noopener">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            Watch on YouTube
          </a>
        </div>
        <div id="videoGrid" class="videos-grid">
          <!-- Videos will be loaded here -->
        </div>
      </div>
    </section>
  </main>



  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year"></span> <span id="footerBrandName">Jeevajyothi Media</span> • <span id="footerText">Believe • Sing • Share</span></p>
      <div class="social">
        <a id="footerFacebook" href="https://www.facebook.com/jeevajyothigospelvoice" target="_blank" rel="noopener">
          <img src="assets/images/facebook.png?v=202605071811" alt="Facebook">
        </a>
        <a id="footerInstagram" href="https://www.instagram.com/jeevajyothi_media" target="_blank" rel="noopener">
          <img src="assets/images/instagram.png?v=202605071811" alt="Instagram">
        </a>
        <a id="footerYouTube" href="https://www.youtube.com/@jeevajyothimedia" target="_blank" rel="noopener">
          <img src="assets/images/youtube.png?v=202605071811" alt="YouTube">
        </a>
      </div>
    </div>
  </footer>


  <script src="assets/js/loader.js"></script>
  <script src="assets/js/content-protection.js" defer></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/load-navigators.js"></script>
  <script src="assets/js/load-videos.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // Show loader on every link click
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('click', function(e) {
        const target = e.target.closest('a');
        if (target && target.href && !target.href.startsWith('javascript:') && target.target !== '_blank') {
          window.LoaderUtils.showGlobalLoader('Loading...');
        }
      });
    });

    // Hide loader on page load
    window.addEventListener('load', function() {
      window.LoaderUtils.hideGlobalLoader();
    });

    // Update brand name and social links
    (function() {
      const LS_KEY = 'site.data.v1';
      function readSiteData() {
        try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; } catch (_) { return null; }
      }
      const site = readSiteData();
      if (site && site.other) {
        const headerBrandName = document.getElementById('headerBrandName');
        const footerBrandName = document.getElementById('footerBrandName');
        const footerText = document.getElementById('footerText');
        if (headerBrandName && site.other.brandName) headerBrandName.textContent = site.other.brandName;
        if (footerBrandName && site.other.brandName) footerBrandName.textContent = site.other.brandName;
        if (footerText && site.other.footerText) footerText.textContent = site.other.footerText;
        const footerFacebook = document.getElementById('footerFacebook');
        const footerInstagram = document.getElementById('footerInstagram');
        const footerYouTube = document.getElementById('footerYouTube');
        if (footerFacebook && site.other.facebookLink) footerFacebook.href = site.other.facebookLink;
        if (footerInstagram && site.other.instagramLink) footerInstagram.href = site.other.instagramLink;
        if (footerYouTube && site.other.youtubeLink) footerYouTube.href = site.other.youtubeLink;
      }
      if (site && site.sidebarAds) {
        const leftAd = site.sidebarAds.left;
        const rightAd = site.sidebarAds.right;
        if (leftAd) {
          const leftLink = document.getElementById('leftAdLink');
          const leftImage = document.getElementById('leftAdImage');
          if (leftLink && leftAd.link) leftLink.href = leftAd.link;
          if (leftImage && leftAd.image) leftImage.src = leftAd.image;
        }
        if (rightAd) {
          const rightLink = document.getElementById('rightAdLink');
          const rightImage = document.getElementById('rightAdImage');
          if (rightLink && rightAd.link) rightLink.href = rightAd.link;
          if (rightImage && rightAd.image) rightImage.src = rightAd.image;
        }
        const leftAd2 = site.sidebarAds.left2;
        const rightAd2 = site.sidebarAds.right2;
        if (leftAd2) {
          const leftLink2 = document.getElementById('leftAdLink2');
          const leftImage2 = document.getElementById('leftAdImage2');
          if (leftLink2 && leftAd2.link) leftLink2.href = leftAd2.link;
          if (leftImage2 && leftAd2.image) leftImage2.src = leftAd2.image;
        }
        if (rightAd2) {
          const rightLink2 = document.getElementById('rightAdLink2');
          const rightImage2 = document.getElementById('rightAdImage2');
          if (rightLink2 && rightAd2.link) rightLink2.href = rightAd2.link;
          if (rightImage2 && rightAd2.image) rightImage2.src = rightAd2.image;
        }
      }
    })();
  </script>

  <!-- Video Modal -->
  <div id="videoModal" class="modal" hidden>
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <button id="prevBtn" class="nav-btn prev-btn">&larr;</button>
      <button id="nextBtn" class="nav-btn next-btn">&rarr;</button>
      <div id="modalVideoContainer"></div>
    </div>
  </div>
</body>
</html>
