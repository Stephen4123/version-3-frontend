     :root {

    /* Article Container & Float Logic */
    .article-with-float-image {
      overflow: hidden;
      width: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      padding: 0;
    }

    /* Responsive Floating Inner Image - Clickable */
    .float-inner-image {
      float: left;
      width: 35%;
      max-width: 280px;
      min-width: 150px;
      margin: 0 25px 15px 0;
      border-radius: 12px;
      overflow: hidden;
      line-height: 0;
      display: block;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .float-inner-image:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .float-inner-image img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    .float-inner-image-caption {
      padding: 8px 12px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.5);
      text-align: center;
      line-height: 1.4;
      margin-top: 0;
      pointer-events: none;
    }

    /* Inner Image Modal/Lightbox */
    .image-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
 backdrop-filter: blur(15px);
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: fadeIn 0.3s ease;
    }

    .image-modal.active {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .image-modal-content {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
      animation: zoomIn 0.3s ease;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .image-modal-content img {
      max-width: 100%;
      max-height: 90vh;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .image-modal-close {
      position: absolute;
      top: -40px;
      right: 0;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .image-modal-close:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: rotate(90deg);
    }

    .image-modal-caption {
      position: absolute;
      bottom: -40px;
      left: 0;
      right: 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 8px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .image-modal-close {
        top: -35px;
        width: 35px;
        height: 35px;
        font-size: 20px;
      }
      .image-modal-caption {
        bottom: -35px;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .image-modal-close {
        top: -30px;
        width: 30px;
        height: 30px;
        font-size: 18px;
      }
      .image-modal-caption {
        bottom: -30px;
        font-size: 0.7rem;
      }

    .gallery-grid {

      gap: 16px;
      margin-bottom: 20px;
      animation: fadeInUp 0.5s ease;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .gallery-item {
      position: relative;
      cursor: pointer;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      aspect-ratio: 1;

      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);

    .gallery-item:hover {

      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.25);
    }
    .gallery-item img {

      height: 100%;

      transition: transform 0.3s ease;

        gap: 10px;

    .gallery-modal {

      top: 0;
      left: 0;

      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeInBackdrop 0.3s ease;
    }
    .gallery-modal.active {
      display: flex;
    }
    @keyframes fadeInBackdrop {
      from {
        opacity: 0;
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        backdrop-filter: blur(12px);
      }
    }
    .gallery-modal-content {
      position: relative;
      max-width: 100vw;
      max-height: 100vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);

      background: rgba(20, 20, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;

    @keyframes slideInScale {

        transform: scale(0.95) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    .gallery-modal-header {

      align-items: center;

    .gallery-modal-header h3 {

      white-space: nowrap;
      margin-right: 10px;
    }
    .gallery-close {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      width: 40px;
      height: 40px;
      border-radius: 50%;

    .gallery-close:hover {

      transform: rotate(90deg);
    }
    .gallery-modal-media {
      width: 100%;
      height: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
      padding: 10px;
      margin: 10px 0;
      min-height: 0;
    }
    .gallery-modal-media img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 12px;
      animation: imageSlideIn 0.4s ease;
    }
    @keyframes imageSlideIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .gallery-modal-media iframe,

      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      border-radius: 12px;
      object-fit: contain;
    }
    .gallery-modal-footer {

      background: rgba(20, 20, 20, 0.95);

      justify-content: space-between;
      align-items: center;

    .gallery-counter {

    .gallery-nav {

      border-radius: 6px;

    .gallery-nav-btn:hover {

    .gallery-nav-btn:disabled {

    @media (max-width: 768px) {

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    // Update brand name and social links
    (function() {
      const LS_KEY = 'site.data.v1';
      function readSiteData() {
        try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; } catch (_) { return null; }
      }
      const site = readSiteData();
      if (site && site.other) {
        const headerBrandName = document.getElementById('headerBrandName');
        const footerBrandName = document.getElementById('footerBrandName');
        const footerText = document.getElementById('footerText');
        if (headerBrandName && site.other.brandName) headerBrandName.textContent = site.other.brandName;
        if (footerBrandName && site.other.brandName) footerBrandName.textContent = site.other.brandName;
        if (footerText && site.other.footerText) footerText.textContent = site.other.footerText;
        const footerFacebook = document.getElementById('footerFacebook');
        const footerInstagram = document.getElementById('footerInstagram');
        const footerYouTube = document.getElementById('footerYouTube');
        if (footerFacebook && site.other.facebookLink) footerFacebook.href = site.other.facebookLink;
        if (footerInstagram && site.other.instagramLink) footerInstagram.href = site.other.instagramLink;
        if (footerYouTube && site.other.youtubeLink) footerYouTube.href = site.other.youtubeLink;
      }
    })();

    function normalizeText(value) {
      return String(value || '')
        .replace(/[^\w\s.-]/g, '')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function isBoardMemberName(authorName, team) {
      if (!authorName || !Array.isArray(team)) return false;
      const normalizedAuthor = normalizeText(authorName);
      return team.some(member => {
        const normalizedMemberName = normalizeText(member.name || member.fullName || '');
        return normalizedMemberName === normalizedAuthor ||
               normalizedMemberName.includes(normalizedAuthor) ||
               normalizedAuthor.includes(normalizedMemberName);
      });
    }

    function findTeamMemberByName(authorName, team) {
      if (!authorName || !Array.isArray(team)) return null;
      const normalizedAuthor = normalizeText(authorName);
      return team.find(member => {
        const normalizedMemberName = normalizeText(member.name || member.fullName || '');
        return normalizedMemberName === normalizedAuthor ||
               normalizedMemberName.includes(normalizedAuthor) ||
               normalizedAuthor.includes(normalizedMemberName);
      }) || null;
    }

    async function loadVoiceArticle() {
      try {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        
        if (!id) {
          document.getElementById('articleContent').innerHTML = '<p style="text-align:center;color:var(--muted);">No voice article found. Please select from the voice hub.</p>';
          return;
        }
        
        let voices = [];
        let teamMembers = [];
          const API_BASE = 'https://api.jeevajyothimedia.com/api/public';
          const [siteResponse, teamResponse] = await Promise.all([
          fetch(`${API_BASE}/voice/${encodeURIComponent(id)}?t=${Date.now()}`).catch(() => null),
          fetch(`${API_BASE}/board-members`).catch(() => null)
        ]);


        if (siteResponse && siteResponse.ok) {
          const site = await siteResponse.json();
          voices = site.voices || [];
        }

        if (teamResponse && teamResponse.ok) {
          const teamData = await teamResponse.json();
          teamMembers = Array.isArray(teamData) ? teamData : [];
        }

        let voice = null;
        if (siteResponse && siteResponse.ok) {
          const v = await siteResponse.json();
          voice = v && v.data ? (Array.isArray(v.data) ? v.data[0] : v.data) : (v && v.id ? v : null);
        }

        
        if (!voice) {
          document.getElementById('articleContent').innerHTML = '<p style="text-align:center;color:var(--muted);">Voice article not found.</p>';
          return;
        }

        
        // Update page title and meta
        document.title = voice.title + ' — Voice Hub';
        
        document.getElementById('articleTitle').textContent = voice.title;

        const authorName = voice.authorName || '';
        const matchedTeamMember = findTeamMemberByName(authorName, teamMembers);
        const authorImage = appendCacheBust(voice.authorImage || matchedTeamMember?.image || '');
        const authorIsBoardMember = authorName && isBoardMemberName(authorName, teamMembers);

        const isAuthorDetailType = true;
        
        // Helper to create the slug
        const authorSlug = encodeURIComponent(
          authorName.toLowerCase().trim().replace(/\s+/g, '-')
        );

        // Determine the correct link based on the user type
        const contributorLink = authorIsBoardMember
          ? `board-member.html?member=${authorSlug}`
          : `voice-contributor.html?contributor=${authorSlug}`;

        const authorPanelStart = (authorName && isAuthorDetailType)
          ? `<a class="speech-author-panel speech-author-panel-link" href="${contributorLink}" style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:1rem 1.1rem;border:1px solid var(--border-color);border-radius:14px;background:rgba(255,255,255,0.03);text-decoration:none;color:inherit;transition:all 0.3s ease;">`
          : '';

        const authorPanelEnd = (authorName && isAuthorDetailType) ? '</a>' : '';
        const authorMarkup = authorName ? `<span class="speech-author-name" style="font-weight:700; color:var(--accent-primary);">${authorName}</span>` : '';

        // Update meta section with author image
        const metaContainer = document.querySelector('.article-meta');
        metaContainer.innerHTML = `
          ${authorName ? `${authorPanelStart}${authorImage ? `<img src="${authorImage}" alt="${authorName}" style="width:88px;height:112px;object-fit:cover;border-radius:10px;border:2px solid rgba(255,255,255,0.2);">` : ''}
            <div>
              <span class="speech-author-label">Author </span>
              ${authorMarkup}
            </div>
          ${authorPanelEnd}` : ''}
          <div class="article-meta-content">
            <div class="article-details">
              <span class="article-date">📅 ${voice.displayDate || voice.date}</span>
              <span class="article-type">🎙️ ${voice.cardLabel || voice.type || 'Voice'}</span>
            </div>
          </div>
        `;

        // Prepare content HTML
        let contentHtml = '';
        if (voice.contentHtml) {
          contentHtml = voice.contentHtml;
        } else if (voice.content) {
          contentHtml = voice.content;
        }
        
        // Highlight brand name in content
        contentHtml = contentHtml.replace(/Jeevajyothi Media/g, '<span class="brand-highlight">$&</span>');
        
        // Handle Inner Image - Clickable to open popup
        const innerImage = voice.innerImage || voice.coverImage || '';
        const innerImageCaption = voice.innerImageCaption || voice.imageCaption || '';
        
        if (innerImage && innerImage.trim() !== '') {
          const floatingImageHtml = `
            <div class="float-inner-image" data-image-src="${appendCacheBust(innerImage)}" data-image-caption="${escapeHtml(innerImageCaption)}">
              <img src="${appendCacheBust(innerImage)}" alt="${escapeHtml(voice.title || 'Article image')}" loading="eager">
              ${innerImageCaption ? `<div class="float-inner-image-caption">${escapeHtml(innerImageCaption)}</div>` : ''}
            </div>
          `;
          contentHtml = floatingImageHtml + contentHtml;
        }
        
        // Set the content
        document.getElementById('articleContent').innerHTML = contentHtml || '<p>No content available.</p>';
        
        // Add click event listeners to inner images for popup
        const innerImageContainers = document.querySelectorAll('.float-inner-image');
        const imageModal = document.getElementById('innerImageModal');
        const modalImg = document.getElementById('modalInnerImage');
        const modalCaption = document.getElementById('modalInnerImageCaption');
        const closeModal = document.getElementById('closeImageModal');
        
        innerImageContainers.forEach(container => {
          container.addEventListener('click', function(e) {
            e.stopPropagation();
            const imgSrc = this.getAttribute('data-image-src') || this.querySelector('img')?.src;
            const imgCaption = this.getAttribute('data-image-caption') || this.querySelector('.float-inner-image-caption')?.textContent || '';
            
            if (imgSrc) {
              modalImg.src = imgSrc;
              modalCaption.textContent = imgCaption;
              imageModal.classList.add('active');
              document.body.style.overflow = 'hidden';
            }
          });
        });
        
        // Close modal when clicking on the modal background or close button
        if (closeModal) {
          closeModal.addEventListener('click', function() {
            imageModal.classList.remove('active');
            document.body.style.overflow = '';
          });
        }
        
        imageModal.addEventListener('click', function(e) {
          if (e.target === imageModal) {
            imageModal.classList.remove('active');
            document.body.style.overflow = '';
          }
        });
        
        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape' && imageModal.classList.contains('active')) {
            imageModal.classList.remove('active');
            document.body.style.overflow = '';
          }
        });

        // Share button
        const shareBtn = document.getElementById('shareBtn');
        if (shareBtn) {
          const newShareBtn = shareBtn.cloneNode(true);
          shareBtn.parentNode.replaceChild(newShareBtn, shareBtn);
          
          newShareBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const articleUrlObj = new URL(window.location.href);
            articleUrlObj.pathname = articleUrlObj.pathname.replace(/\.html$/i, '');
            const url = articleUrlObj.href;
            const brandName = document.getElementById('headerBrandName') ? document.getElementById('headerBrandName').textContent : 'Jeevajyothi Media';
            const submitUrlObj = new URL('voice-hub-submit.html', window.location.origin);
            submitUrlObj.pathname = submitUrlObj.pathname.replace(/\.html$/i, '');
            const submitUrl = submitUrlObj.href;
            const fullText = `🛑*${voice.title || 'Voice'}*
📝*${authorName || 'Unknown'}*
🔗 ${url}

*നിങ്ങളുടെ ചിന്തകളും ലോകമറിയട്ടെ! ✍️*

*ജീവജ്യോതി മീഡിയയിലൂടെ നിങ്ങളുടെ ലേഖനങ്ങളും സന്ദേശങ്ങളും സമൂഹത്തിലേക്ക് പങ്കുവെക്കാം.*

*താഴെ കാണുന്ന ലിങ്ക് വഴി നിങ്ങളുടെ സന്ദേശങ്ങൾ ഞങ്ങൾക്ക് അയച്ചുതരൂ:*
🔗 ${submitUrl}

*നമുക്ക് ഒന്നിച്ച് നല്ലൊരു നാളെയെ വാർത്തെടുക്കാം! 🤝*
🛑*Jeevajyothi Media* 🛑`;

            if (navigator.share) {
              navigator.share({ title: voice.title, text: fullText }).catch(() => {});
            } else if (navigator.clipboard) {
              navigator.clipboard.writeText(fullText).then(() => {
                try {
                  window.toastr && window.toastr.info && window.toastr.info('Link copied to clipboard');
                } catch (e) {}
              }).catch(() => {
                const input = document.createElement('input');
                input.value = fullText;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
              });
            }
          });
        }
        
      } catch (error) {
        console.error('Error loading voice article:', error);
        document.getElementById('articleContent').innerHTML = '<p style="text-align:center;color:var(--muted);">Error loading article. Please try again.</p>';
      }
    }
    
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Load voice article when page loads
    window.LoaderUtils?.requestLoaderHold();
    loadVoiceArticle().finally(() => window.LoaderUtils?.releaseLoaderHold());

    // Use history navigation when returning to preserve scroll position
    const backLink = document.querySelector('.article-actions a[href="voice-hub.html"]');
    if (backLink) {
      backLink.addEventListener('click', function (event) {
        if (document.referrer && document.referrer.includes('voice-hub.html')) {
          event.preventDefault();
          window.history.back();
        }
      });
    }
  </script>
</body>
</html>
