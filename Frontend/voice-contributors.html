  <script>
    // Contributors data and initialization
    const API_BASE = 'http://localhost:3000/api/public';
    const PUBLIC_API_BASE = API_BASE;

    const CONTRIBUTORS_CACHE = new Map();
    
    async function fetchContributorsData(cacheKey, url) {

      if (CONTRIBUTORS_CACHE.has(cacheKey)) return CONTRIBUTORS_CACHE.get(cacheKey);
      
      try {
        const response = await fetch(url);
        const data = await response.json();
        CONTRIBUTORS_CACHE.set(cacheKey, data);
        return data;
      } catch (e) {
        console.error('Error fetching contributors data:', e);
        return [];
      }
    }

    async function fetchVoicesData() {
      try {
        console.log('🔌 Fetching from:', `${PUBLIC_API_BASE}/voices`);
        const r = await fetch(`${PUBLIC_API_BASE}/voices?t=${Date.now()}`);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if (Array.isArray(d)) return d;
        if (Array.isArray(d.data)) return d.data;
        return [];
      } catch (error) {
        console.error('❌ API Error:', error);
        return [];
      }
    }



    function normalizeText(str) {
      if (!str) return '';
      return str.toString().toLowerCase().trim();
    }

    function toSlug(value) {
      return String(value || '')
        .toLowerCase()
        .trim()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9-]/g, '');
    }

    function isValidImageUrl(url) {
      if (!url) return false;
      // Check if URL is not empty and not a placeholder
      const invalidPatterns = ['placeholder', 'default', 'no-image', 'null', 'undefined'];
      const urlLower = url.toLowerCase();
      return !invalidPatterns.some(pattern => urlLower.includes(pattern)) && 
             (urlLower.startsWith('http') || urlLower.startsWith('https'));
    }

    async function loadVoiceContributorsList() {
      const grid = document.getElementById('voice-contributors-grid');
      if (!grid) return;
      
      try {
        const [contributors, voices] = await Promise.all([
          (async () => {
            try {
              console.log('🔌 Fetching from:', `${PUBLIC_API_BASE}/contributors`);
              const r = await fetch(`${PUBLIC_API_BASE}/contributors?t=${Date.now()}`);
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              const d = await r.json();
              return Array.isArray(d) ? d : (Array.isArray(d.data) ? d.data : []);
            } catch (error) {
              console.error('❌ API Error:', error);
              return [];
            }
          })(),
          fetchVoicesData()
        ]);


        
      if (!contributors || contributors.length === 0) {
          grid.innerHTML = '<p style="text-align:center;padding:2rem;">No contributors yet.</p>';
          return;
        }


        const voiceList = Array.isArray(voices) ? voices : [];

        function getContributorPostCount(contributor) {
          const contributorSlug = toSlug(contributor.slug || contributor.name);
          const contributorName = normalizeText(contributor.name);

          return voiceList.filter((voice) => {
            const voiceName = normalizeText(voice.authorName || voice.name);
            const voiceSlug = toSlug(voiceName);
            return voiceSlug === contributorSlug || voiceName === contributorName;
          }).length;
        }

        function getContributorBio(contributor) {
          return contributor.bio || `${contributor.name} is a contributor sharing Christian testimonies and devotionals.`;
        }

        // Create cards with full card clickable - NOT just the image
        grid.innerHTML = '';
        
        contributors.forEach(m => {
          const card = document.createElement('article');
          card.className = 'member-card';
          
          // Add click event to the entire card
          card.addEventListener('click', function() {
            window.location.href = `voice-contributor.html?contributor=${m.slug}`;
          });
          
          // Check if photo exists and is valid
          const hasPhoto = isValidImageUrl(m.picture);
          
          // Build card HTML - conditionally include or hide the image section
          const imageHtml = hasPhoto ? `
            <div class="member-card-media">
              <img class="member-card-photo" src="${escapeHtml(m.picture)}" alt="${escapeHtml(m.name)}" loading="lazy">
            </div>
          ` : '';
          
          card.innerHTML = `
            ${imageHtml}
            <div class="member-card-body">
              <p class="member-card-role">${escapeHtml(m.designation || 'Contributor')}</p>
              <h3 class="member-card-name">${escapeHtml(m.name)}</h3>
              <p class="member-card-duty">📝 ${getContributorPostCount(m)} Posts</p>
            </div>
          `;
          
          // Add a class to the card body if no photo for potential styling
          if (!hasPhoto) {
            card.querySelector('.member-card-body')?.classList.add('no-photo');
          }
          
          grid.appendChild(card);
        });
        
      } catch (error) {
        console.error('❌ API Error:', error);
        grid.innerHTML = '<p class="error" style="text-align:center;padding:2rem;">Failed to load contributors (API error). Check console.</p>';
      }

    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    document.getElementById('year').textContent = new Date().getFullYear();
    
    document.addEventListener('DOMContentLoaded', () => {
      if (document.getElementById('voice-contributors-grid')) {
        loadVoiceContributorsList();
      }
    });
  </script>
